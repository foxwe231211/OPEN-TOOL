<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Contact - OpenByteX</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #050816, #0a0f2c);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 50px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00f0ff, #007bff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      margin: 20px 0;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s forwards;
    }

    .card:nth-child(2) { animation-delay: 0.3s; }
    .card:nth-child(3) { animation-delay: 0.6s; }

    p {
      font-size: 18px;
      line-height: 1.7;
    }

    input, textarea {
      width: 90%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: linear-gradient(90deg, #00f0ff, #007bff);
      border-radius: 30px;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      color: #00f0ff;
      text-decoration: none;
    }

    .email-box {
      margin-top: 15px;
      font-size: 18px;
      color: #00f0ff;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Contact Us</h1>

    <div class="card">
      <p>
        لو عندك أي استفسار أو اقتراح، تقدر تتواصل معانا بسهولة من خلال النموذج ده.
      </p>
    </div>

    <div class="card">
      <form action="mailto:mywe97130@gmail.com" method="POST" enctype="text/plain">
        
        <input type="text" name="name" placeholder="اسمك" required>
        <br>

        <input type="email" name="email" placeholder="بريدك الإلكتروني" required>
        <br>

        <textarea name="message" placeholder="اكتب رسالتك هنا..." required></textarea>
        <br>

        <button class="btn" type="submit">إرسال</button>

      </form>
    </div>

    <div class="card">
      <p>أو تقدر تبعت لنا مباشرة:</p>

      <div class="email-box">
       
      </div>

      <br>

      <a href="mailto:mywe97130@gmail.com" class="btn">
        فتح الإيميل مباشرة
      </a>
    </div>

    <a href="home.html" class="back">⬅ الرجوع للرئيسية</a>

  </div>

</body>
</html>
