<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<link rel="icon" href="images/WE.png">

<title>Open Tools Welcome</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
    background: #020617;
}

/* الخلفية */
body::before,
body::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(140px);
    opacity: 0.25;
    z-index: 0;
}

body::before {
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, #38bdf8, transparent 65%);
    animation: move1 10s ease-in-out infinite alternate;
}

body::after {
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, #6366f1, transparent 65%);
    animation: move2 12s ease-in-out infinite alternate;
}

.glow {
    position: absolute;
    width: 1000px;
    height: 1000px;
    background: radial-gradient(circle, rgba(56,189,248,0.15), transparent 70%);
    filter: blur(180px);
    animation: move3 14s ease-in-out infinite alternate;
}

/* الحركات */
@keyframes move1 {
    0% { transform: translate(-30%, -20%); }
    100% { transform: translate(30%, 20%); }
}

@keyframes move2 {
    0% { transform: translate(30%, 10%); }
    100% { transform: translate(-30%, -25%); }
}

@keyframes move3 {
    0% { transform: translate(0%, 0%); }
    100% { transform: translate(-20%, 30%); }
}

/* المحتوى */
.main {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    gap: 8px;
    width: 60%;
}

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(120px); }
    to { opacity: 1; transform: translateX(0); }
}

.line.small {
    font-size: 26px;
    color: #94a3b8;
    opacity: 0;
    animation: slideInRight 0.8s ease forwards;
}

.line.big {
    font-size: 78px;
    font-weight: 900;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    animation: slideInRight 1s ease forwards;
    animation-delay: 0.2s;
}

.sub {
    color: #94a3b8;
    font-size: 15px;
    opacity: 0;
    animation: slideInRight 1s ease forwards;
    animation-delay: 0.4s;
}

.btn {
    margin-top: 18px;
    padding: 14px 44px;
    font-size: 16px;
    font-weight: 600;
    color: #38bdf8;
    background: transparent;
    border: 2px solid rgba(56,189,248,0.7);
    border-radius: 14px;
    cursor: pointer;
    opacity: 0;
    animation: slideInRight 1s ease forwards;
    animation-delay: 0.6s;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 25px #38bdf8;
}

/* Loader */
.loader {
    position: fixed;
    inset: 0;
    background: #020617;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

.percent {
    font-size: 40px;
    font-weight: bold;
    color: #38bdf8;
    margin-bottom: 20px;
}

.bar {
    width: 320px;
    height: 10px;
    background: #1e293b;
    border-radius: 20px;
    overflow: hidden;
}

.progress {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    transition: width 0.2s;
}

.loading-text {
    margin-top: 15px;
    color: #94a3b8;
}

/* 👇 نافذة الاسم */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(2, 6, 23, 0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.modal-box {
    background: #0f172a;
    padding: 25px;
    border-radius: 16px;
    text-align: center;
    width: 300px;
    box-shadow: 0 0 30px #38bdf8;
    color: white;
}

.modal-box input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

.modal-box button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="glow"></div>

<!-- 👇 نافذة الاسم -->
<div class="modal" id="nameModal">
    <div class="modal-box">
        <h2>أهلاً بيك 👋</h2>
        <p>اكتب اسمك علشان نرحب بيك</p>
        <input type="text" id="nameInput" placeholder="اسمك هنا">
        <button onclick="saveName()">دخول</button>
    </div>
</div>

<div class="main">
    <div class="line small">Welcome to the</div>
    <div class="line big">Open Tools</div>
    <div class="sub">Your tools. Faster. Smarter. Better.</div>
    <button class="btn" onclick="start()">ابدأ النظام</button>
</div>

<div class="loader" id="loader">
    <div class="percent" id="percent">0%</div>
    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="loading-text">Loading Open Tools...</div>
</div>

<script>

let userName;

// 👇 فتح الصفحة
window.onload = function() {
    userName = localStorage.getItem("userName");

    if (userName) {
        document.getElementById("nameModal").style.display = "none";
        document.querySelector(".line.small").innerText =
            "Welcome " + userName + " to the";
    }
};

// 👇 حفظ الاسم
function saveName() {
    let input = document.getElementById("nameInput").value;

    if (input.trim() !== "") {
        localStorage.setItem("userName", input);
        userName = input;

        document.getElementById("nameModal").style.display = "none";

        document.querySelector(".line.small").innerText =
            "Welcome " + userName + " to the";
    }
}

// 👇 بدء النظام
function start(){
    document.querySelector(".main").style.display = "none";
    document.getElementById("loader").style.display = "flex";

    let percent = 0;

    let interval = setInterval(() => {
        percent++;

        document.getElementById("percent").innerText = percent + "%";
        document.getElementById("progress").style.width = percent + "%";

        if(percent >= 100){
            clearInterval(interval);

            setTimeout(() => {
                window.location.href = "home.html";
            }, 500);
        }

    }, 25);
}

</script>

</body>
</html>
