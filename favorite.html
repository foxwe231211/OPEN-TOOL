<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/WE.png">
<title>Open Tools</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">Favorite</div>





  <p class="sub-title"> ⭐ المفضلة حط الربط وكتب اسم الموقع </p>
</header>

<section class="container">

<div class="favorites-container">
<h2>⭐ المفضلة</h2>

  <div class="fav-inputs">
    <input type="text" id="siteName" placeholder="اسم الموقع">
    <input type="text" id="siteURL" placeholder="https://example.com">
    <button onclick="addFavorite()">+</button>
  </div>

  <div id="favoritesList" class="fav-grid"></div>

</div>



<script src="script.js"></script>



</body>
</html>
